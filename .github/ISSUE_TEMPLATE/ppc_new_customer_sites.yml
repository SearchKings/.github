name: 🌐 PPC New Customer Sites
description: Request creation of new customer sites/subdomains
title: 'new-sites(skc123): [Short Description]'
body:
  - type: input
    id: skcid
    attributes:
      label: SKC ID
      description: The SearchKings Customer ID (e.g., skc1002035584)
      placeholder: skc123
    validations:
      required: true

  - type: input
    id: branch_name
    attributes:
      label: Repo Branch Name
      description: The new branch for this customer that branches off from the `master` branch (e.g., us/john-doe)
      placeholder: us/john-doe
    validations:
      required: true

  - type: input
    id: task_url
    attributes:
      label: Task URL (Optional)
      description: Link to the related task, e.g., Ease, Slack, etc.

  - type: textarea
    id: new_sites
    attributes:
      label: New Sites
      description: Add one row per site. `Subdomain` and `Location` are required; `Sublocation` is optional.
      placeholder: |
        | Subdomain | Location | Sublocation |
        |-----------|----------|-------------|
        | example   | Calgary  | NW          |
        | example2  | Toronto  |             |
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: Additional Notes
      description: Any extra context for the developer/agents.
